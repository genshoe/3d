<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>3D Viewer</title>

	<!-- Tailwind -->
	<script src="js/tailwindcss.js"></script>

	<!-- Vue -->
	<script src="js/vue.global.js"></script>

	<!-- Babylon -->
	<script src="js/babylon.js"></script>
	<script src="js/babylonjs.loaders.min.js"></script>
	<script src="js/babylon.gridMaterial.min.js"></script>
</head>

<body>
	<div id="app" class="h-dvh bg-zinc-800 overflow-hidden">

		<div class="flex h-full">
			<!-- Bảng Sidebar -->
			<div class="p-1 w-72 overflow-auto [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden"">

				<div class=" flex justify-around bg-zinc-700 w-full py-3 px-5 mb-1 text-white rounded-lg">
				<select v-model="GLBfileName" class="bg-zinc-800 rounded outline-none">
					<option v-for="shoe in dataJSON" :key="shoe.id" :value="shoe.name">
						{{ shoe.name }}
					</option>
				</select>

				<input type="color" v-model="color" class="w-8 h-8 rounded-lg border-2 border-slate-200 cursor-pointer overflow-hidden [&::-webkit-color-swatch-wrapper]:p-0 [&::-webkit-color-swatch]:border-none [&::-webkit-color-swatch]:rounded-lg">

			</div>

			<!-- Bảng Mesh -->

			<div class="mb-1 border border-2 rounded-lg border-yellow-800 overflow-hidden">

				<!-- Header mesh-->
				<button @click="openMesh=!openMesh" class="flex items-center text-yellow-500 justify-between w-full px-4 py-3 bg-zinc-800">
					<span class="font-semibold">Meshes</span>
					<svg class="w-5 h-5 transition-transform duration-200" :class="{ 'rotate-180': openMesh }" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
					</svg>
				</button>

				<!-- Dropdown mesh -->
				<div v-show="openMesh" class=" p-1 bg-zinc-950 overflow-auto cursor-pointer [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden">
					<div v-for="i in itemList" :key="i.mesh" @click="Select_Mesh(i.mesh,i.material)" :class="{'w-full px-2 mb-1 text-sm text-left bg-yellow-600 text-white rounded': selectMesh === i.mesh, 'w-full mb-1 px-2 text-left text-zinc-300 text-sm rounded bg-zinc-800 hover:bg-zinc-700 ': selectMesh !== i.mesh}">
						{{i.mesh}} - {{i.material}}
						<!--
							<div :class="{'text-xs px-5 text-white' : selectMesh === i.mesh, 'text-xs px-5': selectMesh !== i.mesh}">
								
							</div>
							-->
					</div>
				</div>

			</div>

			<!-- Bảng material -->

			<div class="border border-2 rounded-lg border-green-800 overflow-hidden">

				<!-- Header material -->
				<button @click="openMaterial=!openMaterial" class="flex items-center text-green-500 justify-between w-full px-4 py-3 bg-zinc-800">
					<span class="font-semibold">Materials</span>
					<svg class="w-5 h-5 transition-transform duration-200" :class="{ 'rotate-180': openMaterial }" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
					</svg>
				</button>

				<!-- Dropdown material -->

				<div v-show="openMaterial" class=" p-1 bg-zinc-950 overflow-auto [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden">
					<div v-for="i in materialList" :key="i" :class="{'w-full px-2 mb-1 text-sm text-left bg-green-600 text-white rounded': selectMaterial === i, 'w-full mb-1 px-2 text-left text-zinc-300 text-sm rounded hover:bg-zinc-700 ': selectMaterial !== i}">
						{{i}}
						<button @click="Change_Material(i)" class="px-1 bg-yellow-700 text-sm rounded">Change</button>
					</div>
				</div>

			</div>


		</div>
		<!-- Bảng 3D view -->
		<div class="flex-1">
			<canvas ref="canvas" class="w-full h-full outline-none"></canvas>
		</div>

	</div>


	</div>



	<script>
		Vue.createApp({
			data() {
				return {
					openMesh: false,
					openMaterial: false,
					engine: null,
					scene: null,
					camera: null,
					GLBfileName: null,
					itemList: [],
					meshList2: [],
					materialList: [],

					selectMaterial: null,
					selectMesh: null,

					color: "#00ff7b",

					currentMeshes: [],
					dataJSON: [],
					materialWantChange: null,
					optionMaterial: null,


					selectedMesh: null,
					highlightLayer: null
				}
			},

			async mounted() {
				// Lấy phần tử
				const canvas = this.$refs.canvas;
				// Tạo Engine
				this.engine = new BABYLON.Engine(canvas, true);
				// Tạo Scene
				const scene = new BABYLON.Scene(this.engine);

				// Tạo Camera
				const camera = new BABYLON.ArcRotateCamera(
					"camera",
					Math.PI / 2,
					Math.PI / 3,
					1,
					new BABYLON.Vector3(0, 0.06, 0),
					scene
				);

				camera.attachControl(this.$refs.canvas, true);
				camera.minZ = 0.001;
				camera.maxZ = 1000;
				camera.wheelPrecision = 500;
				camera.panningSensibility = 15000;
				camera.speed = 0.1;

				// Không cho zoom gần hơn
				camera.lowerRadiusLimit = 0.1;
				// Không cho zoom quá xa
				camera.upperRadiusLimit = 1;

				camera.setPosition(new BABYLON.Vector3(0.3, 0.2, 0));

				// Không cho pan quá xa
				const limit = 0.3;
				scene.onBeforeRenderObservable.add(() => {
					camera.target.x = BABYLON.Scalar.Clamp(camera.target.x, -limit, limit);
					camera.target.y = BABYLON.Scalar.Clamp(camera.target.y, -limit, limit);
					camera.target.z = BABYLON.Scalar.Clamp(camera.target.z, -limit, limit);
				});

				// Tạo Light
				const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
				light.intensity = 1;
				// Skybox
				scene.clearColor = new BABYLON.Color4(0.2, 0.2, 0.2, 1);



				//------------------------------------

				this.scene = scene;
				this.camera = camera;

				await this.loadJSON();

				if (this.dataJSON.length > 0) {
					this.GLBfileName = this.dataJSON[0].name;
				}

				//await this.loadModel();

				// Highlight layer
				this.highlightLayer = new BABYLON.HighlightLayer("hl1", scene);

				this.scene.onPointerObservable.add((pointerInfo) => {

					if (pointerInfo.type !== BABYLON.PointerEventTypes.POINTERDOWN) {
						return;
					}

					const pickedMesh = pointerInfo.pickInfo?.pickedMesh;

					// Click khoảng trống
					if (!pickedMesh) {

						if (this.selectedMesh) {
							this.highlightLayer.removeMesh(this.selectedMesh);
							this.selectedMesh = null;
						}

						this.selectMesh = null;
						this.selectMaterial = null;

						console.log("no pick");
						return;
					}

					// Xóa highlight cũ
					if (this.selectedMesh) {
						this.highlightLayer.removeMesh(this.selectedMesh);
					}

					// Lưu mesh đang chọn
					this.selectedMesh = pickedMesh;

					this.selectMesh = pickedMesh.name;
					this.selectMaterial = pickedMesh.material?.name ?? null;

					// Highlight mesh mới
					this.highlightLayer.addMesh(
						pickedMesh,
						BABYLON.Color3.Yellow()

					);
					this.highlightLayer.innerGlow = true;
					this.highlightLayer.outerGlow = false;
					console.log("Selected:", pickedMesh.name);

				});


				//--------------------------------------------

				this.engine.runRenderLoop(() => {
					scene.render();
				});

				window.addEventListener("resize", () => {
					this.engine.resize();
				});

			},

			watch: {
				color(newColor) {

					if (!this.selectMaterial) return;

					const mat = this.scene.getMaterialByName(this.selectMaterial);

					if (mat) {
						mat.albedoColor = BABYLON.Color3.FromHexString(newColor);
					}

				},



				GLBfileName() {
					if (this.scene) {
						this.loadModel();
					}
					this.selectMaterial = null;
				}

			},

			methods: {

				async loadJSON() {
					try {
						const response = await fetch("data.json");
						if (!response.ok) {
							throw new Error("Không đọc được file JSON");
						}
						this.dataJSON = await response.json();
					} catch (err) {
						console.log(err);
					}
				},
				Change_Material(materialName) {
					// Đổi vật liệu
					const mes = this.scene.getMeshByName(this.selectMesh);
					const mate = this.scene.getMaterialByName(materialName);

					if (mes && mate) {
						mes.material = mate;
					}

					const item = this.itemList.find(item => item.mesh === this.selectMesh);

					if (item) {
						item.material = materialName;
						this.Select_Material(materialName)
					}

				},

				Select_Material(id) {
					this.selectMaterial = id
				},
				Select_Mesh(mes, mat) {
					this.selectMesh = mes
					this.selectMaterial = mat



				},
				async loadModel() {

					// Xóa model cũ
					this.currentMeshes.forEach(mesh => {
						if (mesh.material) {
							mesh.material.dispose(true, true);
						}

						if (!mesh.isDisposed()) {
							mesh.dispose();
						}
					});

					this.currentMeshes = [];

					// Load model mới
					const result = await BABYLON.SceneLoader.ImportMeshAsync(
						"",
						"glb/",
						this.GLBfileName + ".glb",
						this.scene
					);

					this.currentMeshes = result.meshes;
					// Cập nhật itemList
					this.itemList = result.meshes
						.filter(mesh => mesh.material)
						.map(mesh => ({
							mesh: mesh.name,
							material: mesh.material.name
						}));

					// Cập nhật meshList2
					this.meshList2 = this.scene.meshes.filter(m => m.name && !m.name.startsWith("__")).map(m => m.name);

					// Cập nhật materialList
					this.materialList = this.scene.materials.map(m => m.name);
				}

			}


		}).mount("#app");
	</script>
</body>

</html>
